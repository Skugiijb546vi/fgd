name: Direct_To_HuggingFace_Ninja_Mode

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لێرە لینکی .m3u8 یان هەر لینکێکی تر دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە (تکایە پاشگری .safetensors یان .bin بەکاربهێنە)'
        required: true
        default: 'model_weights_v1.safetensors'

jobs:
  upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Setup Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q yt-dlp curl_cffi huggingface_hub

      - name: ⬇️ Smart & Secure Download
        run: |
          yt-dlp --impersonate chrome \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 --retries 50 \
                 --fragment-retries 50 \
                 --retry-sleep 10 \
                 --sleep-requests 0.5 \
                 --limit-rate 5M \
                 --skip-unavailable-fragments \
                 --ignore-errors \
                 --continue \
                 --merge-output-format mp4 \
                 -o "video.mp4" \
                 "${{ github.event.inputs.video_url }}" || true

      - name: 🚀 Upload to Hugging Face (Ninja Mode)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          import json
          from huggingface_hub import HfApi
          
          token = os.getenv('HF_TOKEN')
          if not token:
              print('❌ Error: HF_TOKEN is missing in GitHub Secrets!')
              exit(1)
              
          api = HfApi()
          # 💡 ئامانجی نوێ لێرەدا دانراوە
          repo_id = 'Sarko761/ai-training-data'
          original_file_name = '${{ github.event.inputs.file_name }}'
          
          if not (original_file_name.endswith('.safetensors') or original_file_name.endswith('.bin')):
              file_name = original_file_name.split('.')[0] + '.safetensors'
              print(f'⚠️ Warning: Changed extension for safety -> {file_name}')
          else:
              file_name = original_file_name

          fake_config = {
              'architectures': ['VisionTransformer'],
              'model_type': 'vit',
              'hidden_size': 768,
              'description': 'Training weights for action recognition dataset'
          }
          with open('config.json', 'w') as f:
              json.dump(fake_config, f)
          
          print(f'📤 Sending to Hugging Face: {file_name}...')
          
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='config.json',
                  path_in_repo='config.json',
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ Done! Uploaded successfully as an AI Model.')
              
              os.remove('video.mp4')
              os.remove('config.json')
              print('🗑️ Cleaned up GitHub server successfully.')
          else:
              print('❌ Error: Video file not found! Download might have failed.')
              exit(1)
          "
