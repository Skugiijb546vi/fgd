name: Direct_To_HuggingFace_Fast

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لێرە لینکی .m3u8 یان هەر لینکێکی تر دابنێ'
        required: true
      file_name:
        description: 'ناوی فایلەکە لەناو Hugging Face'
        required: true
        default: 'video_output.mp4'

jobs:
  upload_job:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Setup Tools
        run: |
          sudo apt-get update -qq
          # دابەزاندنی ffmpeg بۆ یەکخستنی پارچەکانی ڤیدیۆکە
          sudo apt-get install -y ffmpeg -qq
          pip install -q yt-dlp curl_cffi huggingface_hub

      - name: ⬇️ Smart & Secure Download
        run: |
          # زیادکردنی retries بۆ ئەوەی لە کاتی پچڕانی هێڵەکەدا نەوەستێت
          yt-dlp --impersonate chrome \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 --retries 50 \
                 --fragment-retries 50 \
                 --retry-sleep 3 \
                 --merge-output-format mp4 \
                 -o "video.mp4" \
                 "${{ github.event.inputs.video_url }}"

      - name: 🚀 Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          import os
          from huggingface_hub import HfApi
          
          token = os.getenv('HF_TOKEN')
          if not token:
              print('❌ Error: HF_TOKEN is missing in GitHub Secrets!')
              exit(1)
              
          api = HfApi()
          repo_id = 'Sarko57/sarko987'
          file_name = '${{ github.event.inputs.file_name }}'
          
          print(f'📤 Sending to Hugging Face: {file_name}...')
          
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('✅ Done! Uploaded successfully.')
              
              # سڕینەوەی ڤیدیۆکە لە سێرڤەری گیتھەب دوای ئەوەی بە سەرکەوتوویی نێردرا
              os.remove('video.mp4')
              print('🗑️ Video deleted from GitHub server successfully.')
          else:
              print('❌ Error: Video file not found! Download might have failed.')
              exit(1)
          "
